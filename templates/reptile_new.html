<!DOCTYPE html>
<html>
<head><title>最新爬取 - HJW</title></head>
<body style="font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0;">
    <nav style="background: #333; padding: 15px 30px; display: flex; gap: 20px;">
        <a href="/" style="color: #fff; text-decoration: none; font-weight: bold;">🔄 主页</a>
        <a href="/reptile/new" style="color: #fff; text-decoration: none; font-weight: bold;">✨ 最新爬取</a>
        <a href="/reptile/old" style="color: #fff; text-decoration: none; font-weight: bold;">📚 全部爬记录</a>
        <a href="/history/manager_999" style="color: #fff; text-decoration: none; font-weight: bold;">⬇️ 下载历史</a>
    </nav>
    <div style="padding: 40px; max-width: 1000px; margin: 0 auto;">
        <h2>🕷️ 最新爬取结果 ({{ tasks|length }} 条)</h2>
        <div style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
            <a href="/api/reptile/export" style="background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">📥 导出全部 TXT (移至历史)</a>
            <form action="/api/reptile/oneclick" method="post" style="margin: 0;">
                <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">🚀 一键全部下载 (移至历史)</button>
            </form>
            <button onclick="exportSelected('new')" style="background: #17a2b8; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">📄 导出选中 TXT</button>
            <button onclick="downloadSelected('new')" style="background: #fd7e14; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">⬇️ 下载选中</button>
            <span id="selected-count" style="font-weight: bold; color: #555;">已选: 0</span>
        </div>
        <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            {% if tasks %}
                <table style="width: 100%; border-collapse: collapse;">
                    <tr style="border-bottom: 2px solid #eee; text-align: left;">
                        <th style="padding: 10px;"><input type="checkbox" id="select-all" onclick="toggleAll(this)"></th>
                        <th style="padding: 10px;">ID</th>
                        <th style="padding: 10px;">标题</th>
                        <th style="padding: 10px;">作者</th>
                        <th style="padding: 10px;">时间</th>
                        <th style="padding: 10px;">链接</th>
                    </tr>
                    {% for task in tasks %}
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 10px;"><input type="checkbox" class="row-check" value="{{ task.id }}" data-title="{{ task.title }}" data-url="{{ task.url }}" data-author="{{ task.author }}" onchange="updateCount()"></td>
                        <td style="padding: 10px;">{{ task.id }}</td>
                        <td style="padding: 10px;">{{ task.title }}</td>
                        <td style="padding: 10px;">{{ task.author }}</td>
                        <td style="padding: 10px;">{{ task.time_added }}</td>
                        <td style="padding: 10px;"><a href="{{ task.url }}" target="_blank">直达链接</a></td>
                    </tr>
                    {% endfor %}
                </table>
            {% else %}
                <p>暂无新数据。</p>
            {% endif %}
        </div>
    </div>

    <script>
    function toggleAll(master) {
        document.querySelectorAll('.row-check').forEach(cb => cb.checked = master.checked);
        updateCount();
    }
    function updateCount() {
        const cnt = document.querySelectorAll('.row-check:checked').length;
        document.getElementById('selected-count').textContent = '已选: ' + cnt;
    }
    function getSelectedData() {
        const checked = document.querySelectorAll('.row-check:checked');
        if (checked.length === 0) { alert('请先勾选至少一条数据'); return null; }
        const ids = [];
        checked.forEach(cb => ids.push(cb.value));
        return ids;
    }
    function exportSelected(source) {
        const ids = getSelectedData();
        if (!ids) return;
        // 通过隐藏form GET 提交
        const form = document.createElement('form');
        form.method = 'GET';
        form.action = '/api/reptile/export_selected';
        const inputIds = document.createElement('input');
        inputIds.type = 'hidden'; inputIds.name = 'ids'; inputIds.value = ids.join(',');
        form.appendChild(inputIds);
        const inputSrc = document.createElement('input');
        inputSrc.type = 'hidden'; inputSrc.name = 'source'; inputSrc.value = source;
        form.appendChild(inputSrc);
        document.body.appendChild(form);
        form.submit();
    }
    function downloadSelected(source) {
        const ids = getSelectedData();
        if (!ids) return;
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/api/reptile/download_selected';
        const inputIds = document.createElement('input');
        inputIds.type = 'hidden'; inputIds.name = 'ids'; inputIds.value = ids.join(',');
        form.appendChild(inputIds);
        const inputSrc = document.createElement('input');
        inputSrc.type = 'hidden'; inputSrc.name = 'source'; inputSrc.value = source;
        form.appendChild(inputSrc);
        document.body.appendChild(form);
        form.submit();
    }
    </script>
</body>
</html>
