services:
  app:
    image: ghcr.io/rreinger0328/hjdownload:main
    container_name: hjw_downloader
    shm_size: '256m'  # 低内存环境；--disable-dev-shm-usage 已设为 /tmp，无需大 shm
    ports:
      - "5000:5000"
    volumes:
      # 映射到你指定的 NAS 视频存储路径
      - /vol1/1000/video/AVI:/downloads
      - ./data:/app/data
      - ./log:/app/log        # 应用日志持久化到宿主机
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis_db
    depends_on:
      - redis_db
    restart: always
    deploy:
      resources:
        limits:
          memory: 2048M

  redis_db:
    image: redis:7-alpine
    container_name: hjw_redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
