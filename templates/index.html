<!DOCTYPE html>
<html>
<head><title>HJW 下载器</title></head>
<body style="font-family: sans-serif; background: #f4f7f6; padding: 40px; display: flex; justify-content: center;">
    <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px;">
        <h2>🚀 HJW 自动分类下载器 (WebSocket 版)</h2>
        <form method="post">
            <textarea name="video_txt" style="width: 100%; height: 300px; padding: 10px;" placeholder="标题: xxx | 链接: xxx&#10;作者: xxx"></textarea>
            <button type="submit" style="width: 100%; background: #28a745; color: white; padding: 15px; border: none; margin-top: 10px; cursor: pointer;">开始批量下载</button>
        </form>
        <p style="text-align: center; margin-top: 20px;"><a href="/history/{{ history_token }}" style="color: #666; text-decoration: none;">📅 查看历史记录</a></p>
    </div>
</body>
</html>
