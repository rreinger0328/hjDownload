<!DOCTYPE html>
<html>
<head>
    <title>下载批次统计</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📈 下载批次统计</h2>
        <table>
            <thead>
                <tr>
                    <th>Token / 监控链接</th>
                    <th>总任务数</th>
                    <th>正在运行</th>
                    <th>创建时间</th>
                </tr>
            </thead>
            <tbody>
                {% for t in tokens %}
                <tr>
                    <td>
                        <a href="/status/{{ t.token }}" target="_blank">{{ t.token }}</a>
                    </td>
                    <td>{{ t.total }}</td>
                    <td style="color: {{ 'green' if t.running == 0 else '#e67e22' }}; font-weight: bold;">
                        {{ t.running }}
                    </td>
                    <td>{{ t.time }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br><a href="/">返回首页</a>
    </div>
</body>
</html>
